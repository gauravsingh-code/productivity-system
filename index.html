
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Cracker · Love Babbar 450</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080c14;
  --sidebar:   #0d1220;
  --surface:   #111827;
  --card:      #141e30;
  --border:    #1e2d42;
  --border2:   #253348;
  --text:      #e8edf5;
  --muted:     #4a6080;
  --muted2:    #6b84a0;
  --accent:    #3b82f6;
  --accent2:   #60a5fa;
  --green:     #22c55e;
  --green-bg:  #15803d20;
  --yellow:    #eab308;
  --red:       #ef4444;
  --sidebar-w: 280px;
  --topbar-h:  56px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Outfit', sans-serif;
  --radius: 10px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ════════════════════════════════
   TOP BAR
════════════════════════════════ */
.topbar {
  height: var(--topbar-h);
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 100;
  position: relative;
}

.topbar-brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}

.brand-badge {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: 0 0 16px #3b82f630;
}

.brand-name {
  font-size: 16px; font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}

.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
}

.topbar-search {
  flex: 1;
  max-width: 420px;
  margin-left: auto;
  position: relative;
}

.topbar-search svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}

.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 12px 8px 34px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13.5px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}

.search-input:focus {
  border-color: var(--accent);
  background: var(--card);
}

.search-input::placeholder { color: var(--muted); }

.topbar-right {
  display: flex; align-items: center; gap: 10px; margin-left: 12px;
}

.topbar-stat {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--muted2);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}

.topbar-stat span { color: var(--text); font-weight: 600; }

.hamburger {
  display: none;
  background: none;
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 8px;
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.2s;
}

.hamburger:hover { color: var(--text); border-color: var(--accent); }

/* ════════════════════════════════
   LAYOUT
════════════════════════════════ */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ════════════════════════════════
   SIDEBAR
════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.28s var(--ease), transform 0.28s var(--ease);
}

.sidebar.collapsed {
  width: 64px;
}

.sidebar-toggle {
  position: absolute;
  left: calc(var(--sidebar-w) - 13px);
  top: calc(var(--topbar-h) + 24px);
  z-index: 200;
  width: 26px; height: 26px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--muted2);
  transition: all 0.28s var(--ease);
  font-size: 10px;
}

.sidebar-toggle:hover { color: var(--text); border-color: var(--accent); }

.sidebar.collapsed ~ .sidebar-toggle {
  left: 51px;
}

/* Overall Progress in Sidebar */
.sidebar-progress {
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sp-label {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  transition: opacity 0.2s;
}

.sidebar.collapsed .sp-label { opacity: 0; }

.sp-track {
  height: 5px;
  background: var(--border2);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 6px;
  transition: opacity 0.2s;
}

.sidebar.collapsed .sp-track { opacity: 0; }

.sp-fill {
  height: 100%;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6);
  border-radius: 999px;
  transition: width 0.6s var(--ease);
  min-width: 2px;
}

.sp-counts {
  display: flex; justify-content: space-between;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted2);
  transition: opacity 0.2s;
}

.sidebar.collapsed .sp-counts { opacity: 0; }

.sp-counts .done-c { color: var(--green); font-weight: 600; }

/* Sidebar nav */
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 0;
}

.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.nav-section-label {
  padding: 8px 16px 4px;
  font-size: 10px;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  transition: opacity 0.2s;
}

.sidebar.collapsed .nav-section-label { opacity: 0; height: 0; padding: 0; overflow: hidden; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  border-radius: 8px;
  margin: 1px 6px;
  transition: background 0.15s, color 0.15s;
  position: relative;
  text-decoration: none;
  color: var(--muted2);
  overflow: hidden;
  white-space: nowrap;
}

.nav-item:hover {
  background: var(--surface);
  color: var(--text);
}

.nav-item.active {
  background: #3b82f620;
  color: var(--accent2);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.nav-icon {
  font-size: 16px;
  flex-shrink: 0;
  width: 22px;
  text-align: center;
}

.nav-label {
  font-size: 13.5px;
  font-weight: 500;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: opacity 0.15s;
}

.sidebar.collapsed .nav-label { opacity: 0; width: 0; }

.nav-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border2);
  flex-shrink: 0;
  transition: opacity 0.15s;
  min-width: 32px;
  text-align: center;
}

.sidebar.collapsed .nav-badge { opacity: 0; width: 0; padding: 0; border: none; }

.nav-item.active .nav-badge {
  background: #3b82f625;
  border-color: #3b82f640;
  color: var(--accent2);
}

/* progress ring in collapsed mode */
.nav-ring {
  position: absolute;
  right: 6px; top: 50%; transform: translateY(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.2s;
}

.sidebar.collapsed .nav-ring { opacity: 1; }

/* ════════════════════════════════
   MAIN CONTENT
════════════════════════════════ */
.main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}

.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: var(--bg); }
.main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.content-area {
  padding: 28px 28px 60px;
  flex: 1;
}

/* ── Section Header ── */
.section-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.sh-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.sh-meta { flex: 1; }

.sh-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.4px;
  margin-bottom: 4px;
}

.sh-desc {
  font-size: 13px;
  color: var(--muted2);
  font-family: var(--mono);
}

.sh-actions {
  display: flex; align-items: center; gap: 8px;
  margin-top: 4px;
}

.sh-btn {
  font-size: 12px;
  font-family: var(--mono);
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.18s;
}

.sh-btn:hover {
  border-color: var(--accent);
  color: var(--accent2);
  background: #3b82f610;
}

.sh-btn.danger:hover {
  border-color: var(--red);
  color: var(--red);
  background: #ef444410;
}

/* ── Topic Progress Bar ── */
.topic-progress-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.tpb-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted2);
  white-space: nowrap;
}

.tpb-track {
  flex: 1;
  height: 6px;
  background: var(--border2);
  border-radius: 999px;
  overflow: hidden;
}

.tpb-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.5s var(--ease);
  min-width: 3px;
}

.tpb-pct {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  min-width: 42px;
  text-align: right;
}

.tpb-counts {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted2);
  white-space: nowrap;
}

/* ── Filter Row ── */
.filter-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 20px;
}

.filter-chip {
  font-size: 12.5px;
  font-family: var(--mono);
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.18s;
}

.filter-chip:hover { color: var(--text); border-color: var(--border2); }

.filter-chip.active {
  background: #3b82f622;
  border-color: #3b82f650;
  color: var(--accent2);
}

/* ── Question Table ── */
.q-table {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.q-table-header {
  display: grid;
  grid-template-columns: 44px 40px 1fr 90px 70px;
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.q-row {
  display: grid;
  grid-template-columns: 44px 40px 1fr 90px 70px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  transition: background 0.12s;
  animation: rowIn 0.25s var(--ease) both;
}

@keyframes rowIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.q-row:last-child { border-bottom: none; }
.q-row:hover { background: var(--surface); }
.q-row.done { background: #15803d08; }

/* Checkbox */
.q-check {
  width: 20px; height: 20px;
  border: 2px solid var(--border2);
  border-radius: 5px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease);
  flex-shrink: 0;
}

.q-check:hover { border-color: var(--green); }

.q-check.checked {
  background: var(--green);
  border-color: var(--green);
}

.q-check.checked::after {
  content: '';
  width: 5px; height: 8px;
  border: 2px solid white;
  border-top: none; border-left: none;
  transform: rotate(45deg) translateY(-1px);
  display: block;
}

/* Number */
.q-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-align: right;
}

/* Text */
.q-text {
  font-size: 13.5px;
  line-height: 1.45;
  padding: 0 12px;
  transition: color 0.2s;
}

.q-row.done .q-text {
  color: var(--muted);
  text-decoration: line-through;
  text-decoration-color: #4a608080;
}

/* Difficulty */
.q-diff {
  display: flex; justify-content: center;
}

.diff-tag {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.diff-easy { background: #22c55e18; color: #4ade80; }
.diff-med  { background: #f5900018; color: #fb923c; }
.diff-hard { background: #ef444418; color: #f87171; }

/* Link */
.q-link-cell { display: flex; justify-content: flex-end; }

.q-ext-link {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  text-decoration: none;
  color: var(--muted2);
  transition: all 0.18s;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}

.q-ext-link.gfg:hover  { border-color: #4ade80; color: #4ade80; background: #22c55e10; }
.q-ext-link.lc:hover   { border-color: #fbbf24; color: #fbbf24; background: #f59e0b10; }
.q-ext-link:not(.gfg):not(.lc):hover { border-color: var(--accent); color: var(--accent2); }

/* Empty state */
.empty-qs {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-qs h4 { font-size: 16px; color: var(--muted2); margin-bottom: 8px; }

/* ════════════════════════════════
   OVERVIEW / HOME PANEL
════════════════════════════════ */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}

.ov-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  position: relative;
  overflow: hidden;
}

.ov-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px #00000030;
  border-color: var(--border2);
}

.ov-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
}

.ov-card:hover::before { opacity: 1; }

.ov-icon { font-size: 22px; margin-bottom: 10px; }

.ov-name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ov-bar-track {
  height: 4px;
  background: var(--border2);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 6px;
}

.ov-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.5s var(--ease);
  min-width: 2px;
}

.ov-stat {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted2);
  display: flex; justify-content: space-between;
}

.ov-stat .done-n { font-weight: 600; }

/* Big stat cards */
.big-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}

.big-stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}

.big-stat .bs-val {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  display: block;
  margin-bottom: 4px;
}

.big-stat .bs-label {
  font-size: 12px;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.big-stat.total .bs-val { color: var(--accent2); }
.big-stat.solved .bs-val { color: var(--green); }
.big-stat.rem .bs-val { color: var(--yellow); }

/* ── Confetti ── */
.particle {
  position: fixed; pointer-events: none;
  z-index: 9999;
  border-radius: 3px;
  animation: pFly 0.9s ease-out forwards;
}

@keyframes pFly {
  0%   { opacity:1; transform: translate(0,0) scale(1) rotate(0deg); }
  100% { opacity:0; transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--r)); }
}

/* ── Save Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--card);
  border: 1px solid var(--green);
  border-radius: 8px;
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--green);
  z-index: 9990;
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}

.toast.show {
  opacity: 1; transform: translateY(0);
}

/* ════════════════════════════════
   MOBILE
════════════════════════════════ */
@media (max-width: 768px) {
  :root { --sidebar-w: 100vw; }

  .sidebar {
    position: fixed;
    left: 0; top: var(--topbar-h); bottom: 0;
    z-index: 300;
    transform: translateX(-100%);
    width: 260px !important;
  }

  .sidebar.mobile-open {
    transform: translateX(0);
    box-shadow: 8px 0 32px #00000060;
  }

  .sidebar-toggle { display: none; }
  .hamburger { display: flex; align-items: center; }

  .topbar-stat { display: none; }
  .topbar-search { max-width: 200px; }

  .content-area { padding: 20px 16px 60px; }

  .q-table-header,
  .q-row {
    grid-template-columns: 36px 30px 1fr 60px;
  }

  .q-diff { display: none; }

  .big-stats { grid-template-columns: 1fr 1fr; }
  .big-stats .big-stat:last-child { grid-column: 1 / -1; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="hamburger" onclick="toggleMobileSidebar()" aria-label="Menu">
    <svg width="16" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 16 12">
      <path d="M0 1h16M0 6h16M0 11h16"/>
    </svg>
  </button>

  <a class="topbar-brand" onclick="showOverview()" style="cursor:pointer">
    <div class="brand-badge">🧠</div>
    <div>
      <div class="brand-name">DSA Cracker</div>
      <div class="brand-sub">Love Babbar · 450</div>
    </div>
  </a>

  <div class="topbar-search">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" id="search-input" placeholder="Search questions…" oninput="onSearch(this.value)">
  </div>

  <div class="topbar-right">
    <div class="topbar-stat">✅ <span id="tb-done">0</span> / <span id="tb-total">451</span></div>
    <div class="topbar-stat">🔥 <span id="tb-pct">0%</span></div>
  </div>
</div>

<div class="app-body">

  <!-- SIDEBAR TOGGLE BUTTON -->
  <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">◀</button>

  <!-- SIDEBAR -->

secutive-elements/0"},{"num":39,"text":"String matching where one string contains wildcard characters","url":"https://practice.geeksforgeeks.org/problems/wildcard-string-matching/0"},{"num":40,"text":"Function to find Number of customers who could not get a computer","url":"https://www.geeksforgeeks.org/function-to-find-number-of-customers-who-could-not-get-a-computer/"},{"num":41,"text":"Transform One String to Another using Minimum Number of Given Operation \uea5e","url":"https://www.geeksforgeeks.org/transform-one-string-to-another-using-minimum-number-of-given-operation/"},{"num":42,"text":"Check if two given strings are isomorphic to each other","url":"https://practice.geeksforgeeks.org/problems/isomorphic-strings/0"},{"num":43,"text":"Recursively print all sentences that can be formed from list of word lists","url":"https://www.geeksforgeeks.org/recursively-print-all-sentences-that-can-be-formed-from-list-of-word-lists/"}],"Trie":[{"num":1,"text":"Construct a trie from scratch","url":"https://www.geeksforgeeks.org/trie-insert-and-search/"},{"num":2,"text":"Find shortest unique prefix for every word in a given list","url":"https://www.geeksforgeeks.org/find-all-shortest-unique-prefixes-to-represent-each-word-in-a-given-list/"},{"num":3,"text":"Word Break Problem | (Trie solution)","url":"https://www.geeksforgeeks.org/word-break-problem-trie-solution/"},{"num":4,"text":"Given a sequence of words, print all anagrams together","url":"https://practice.geeksforgeeks.org/problems/k-anagrams-1/0"},{"num":5,"text":"Implement a Phone Directory","url":"https://practice.geeksforgeeks.org/problems/phone-directory/0"},{"num":6,"text":"Print unique rows in a given boolean matrix","url":"https://practice.geeksforgeeks.org/problems/unique-rows-in-boolean-matrix/1"}]};

const ICONS = {"Array": "\u26a1", "Backtracking": "\ud83d\udd04", "Binary Tree": "\ud83c\udf33", "Bitmanipulation": "\u2699\ufe0f", "BST": "\ud83c\udf32", "Dynamic Programming": "\ud83d\udc8e", "Graph": "\ud83d\udd78\ufe0f", "Greedy": "\ud83c\udfc6", "Heap": "\ud83d\udce6", "Linked List": "\ud83d\udd17", "Matrix": "\ud83e\uddee", "Search & Sort": "\ud83d\udd0d", "Stacks & Queue": "\ud83d\udcda", "String": "\u270d\ufe0f", "Trie": "\ud83c\udf34"};
const COLORS = {"Array": "#f97316", "Backtracking": "#a855f7", "Binary Tree": "#22d3ee", "Bitmanipulation": "#facc15", "BST": "#4ade80", "Dynamic Programming": "#c084fc", "Graph": "#fb7185", "Greedy": "#fb923c", "Heap": "#34d399", "Linked List": "#60a5fa", "Matrix": "#f472b6", "Search & Sort": "#2dd4bf", "Stacks & Queue": "#a78bfa", "String": "#fbbf24", "Trie": "#86efac"};
const TOPICS = Object.keys(DSA_DATA);
const TOTAL = Object.values(DSA_DATA).reduce((a,b)=>a+b.length,0);

// ── PERSISTENCE (localStorage with IndexedDB fallback) ────
const DB_KEY = 'dsa_cracker_v2';
let solved = new Set();
let currentTopic = null; // null = overview
let activeFilter = 'all';
let searchQuery = '';
let sidebarCollapsed = false;

// Load state from localStorage
function loadState() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      solved = new Set(obj.solved || []);
      sidebarCollapsed = !!obj.sidebarCollapsed;
    }
  } catch(e) { console.warn('Load failed', e); }
}

// Save state to localStorage
let saveTimer = null;
function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      const obj = { solved: [...solved], sidebarCollapsed, ts: Date.now() };
      localStorage.setItem(DB_KEY, JSON.stringify(obj));
      showToast();
    } catch(e) { console.warn('Save failed', e); }
  }, 300);
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── KEYS ──────────────────────────────────────────────────
function qKey(topic, num) { return topic + '|' + num; }

// ── STATS ─────────────────────────────────────────────────
function getTopicStats(topic) {
  const qs = DSA_DATA[topic];
  const done = qs.filter(q => solved.has(qKey(topic, q.num))).length;
  return { total: qs.length, done, pct: Math.round(done/qs.length*100) };
}

function updateAllStats() {
  const done = solved.size;
  const pct = Math.round(done / TOTAL * 100);

  document.getElementById('tb-done').textContent = done;
  document.getElementById('tb-total').textContent = TOTAL;
  document.getElementById('tb-pct').textContent = pct + '%';
  document.getElementById('sp-fill').style.width = pct + '%';
  document.getElementById('sp-done').textContent = done;
  document.getElementById('sp-rem').textContent = TOTAL - done;

  // Update nav badges
  TOPICS.forEach(t => {
    const s = getTopicStats(t);
    const badge = document.getElementById('badge-' + t);
    const ring = document.getElementById('ring-' + t);
    if (badge) badge.textContent = s.done + '/' + s.total;
    if (ring) ring.style.background = s.pct === 100 ? '#22c55e' : COLORS[t] || '#3b82f6';
  });
}

// ── SIDEBAR ───────────────────────────────────────────────
function buildSidebarNav() {
  const container = document.getElementById('topic-nav-items');
  container.innerHTML = TOPICS.map(topic => {
    const s = getTopicStats(topic);
    const icon = ICONS[topic] || '📌';
    const color = COLORS[topic] || '#6366f1';
    return `<div class="nav-item" id="nav-${topic}" onclick="selectTopic('${topic}')">
      <span class="nav-icon">${icon}</span>
      <span class="nav-label">${topic}</span>
      <span class="nav-badge" id="badge-${topic}">${s.done}/${s.total}</span>
      <span class="nav-ring" id="ring-${topic}" style="background:${color};"></span>
    </div>`;
  }).join('');
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle');
  sb.classList.toggle('collapsed', sidebarCollapsed);
  btn.textContent = sidebarCollapsed ? '▶' : '◀';
  btn.style.left = sidebarCollapsed ? '51px' : 'calc(var(--sidebar-w) - 13px)';
  saveState();
}

function toggleMobileSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

// ── DIFFICULTY HEURISTIC ──────────────────────────────────
function getDiff(topic, num) {
  const total = DSA_DATA[topic].length;
  const third = Math.ceil(total / 3);
  if (num <= third) return 'easy';
  if (num <= third * 2) return 'med';
  return 'hard';
}

// ── LINK HELPERS ─────────────────────────────────────────
function linkClass(url) {
  if (!url) return '';
  if (url.includes('geeksforgeeks')) return 'gfg';
  if (url.includes('leetcode')) return 'lc';
  return '';
}

function linkLabel(url) {
  if (!url) return '';
  if (url.includes('geeksforgeeks')) return 'GFG ↗';
  if (url.includes('leetcode')) return 'LC ↗';
  return '↗';
}

// ── OVERVIEW ──────────────────────────────────────────────
function showOverview() {
  currentTopic = null;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  setActiveNav('nav-home');
  closeMobileSidebar();

  const done = solved.size;
  const pct = Math.round(done / TOTAL * 100);

  const cards = TOPICS.map(topic => {
    const s = getTopicStats(topic);
    const color = COLORS[topic] || '#6366f1';
    const icon = ICONS[topic] || '📌';
    return `<div class="ov-card" onclick="selectTopic('${topic}')" style="--c:${color}">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,${color}08,${color}02);pointer-events:none;border-radius:var(--radius);"></div>
      <div class="ov-icon">${icon}</div>
      <div class="ov-name">${topic}</div>
      <div class="ov-bar-track">
        <div class="ov-bar-fill" style="width:${s.pct}%;background:${color};"></div>
      </div>
      <div class="ov-stat">
        <span><span class="done-n" style="color:${color}">${s.done}</span>/${s.total}</span>
        <span>${s.pct}%</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content-area').innerHTML = `
    <div class="section-header">
      <div class="sh-icon" style="background:#3b82f620;font-size:26px">🧠</div>
      <div class="sh-meta">
        <div class="sh-title">Dashboard</div>
        <div class="sh-desc">Love Babbar DSA Cracker — ${TOTAL} problems across ${TOPICS.length} topics</div>
        <div class="sh-actions">
          <button class="sh-btn danger" onclick="resetAll()">↺ Reset Progress</button>
          <button class="sh-btn" onclick="exportProgress()">⬇ Export</button>
          <button class="sh-btn" onclick="importProgress()">⬆ Import</button>
        </div>
      </div>
    </div>

    <div class="big-stats">
      <div class="big-stat total">
        <span class="bs-val">${TOTAL}</span>
        <div class="bs-label">Total Questions</div>
      </div>
      <div class="big-stat solved">
        <span class="bs-val">${done}</span>
        <div class="bs-label">Solved</div>
      </div>
      <div class="big-stat rem">
        <span class="bs-val">${TOTAL - done}</span>
        <div class="bs-label">Remaining</div>
      </div>
    </div>

    <div style="font-size:13px;color:var(--muted2);margin-bottom:14px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em">All Topics</div>
    <div class="overview-grid">${cards}</div>
  `;
}

// ── TOPIC VIEW ────────────────────────────────────────────
function selectTopic(topic) {
  currentTopic = topic;
  activeFilter = 'all';
  searchQuery = '';
  document.getElementById('search-input').value = '';
  setActiveNav('nav-' + topic);
  closeMobileSidebar();
  renderTopicView();
}

function renderTopicView() {
  const topic = currentTopic;
  if (!topic) return showOverview();

  const qs = DSA_DATA[topic];
  const color = COLORS[topic] || '#3b82f6';
  const icon = ICONS[topic] || '📌';
  const s = getTopicStats(topic);

  let filtered = qs;
  if (searchQuery) filtered = filtered.filter(q => q.text.toLowerCase().includes(searchQuery));
  if (activeFilter === 'done') filtered = filtered.filter(q => solved.has(qKey(topic, q.num)));
  if (activeFilter === 'todo') filtered = filtered.filter(q => !solved.has(qKey(topic, q.num)));

  const rows = filtered.length === 0
    ? `<div class="empty-qs"><h4>No questions match</h4><p>Try adjusting filters</p></div>`
    : filtered.map((q, i) => {
        const key = qKey(topic, q.num);
        const isDone = solved.has(key);
        const diff = getDiff(topic, q.num);
        const diffLabel = diff === 'easy' ? 'Easy' : diff === 'med' ? 'Medium' : 'Hard';
        const lc = linkClass(q.url);
        const ll = linkLabel(q.url);
        return `<div class="q-row${isDone ? ' done' : ''}" id="row-${key}" style="animation-delay:${i*0.018}s">
          <div class="q-check${isDone ? ' checked' : ''}" onclick="toggleQ('${topic}','${q.num}',this)"></div>
          <div class="q-num">${q.num}</div>
          <div class="q-text">${q.text}</div>
          <div class="q-diff"><span class="diff-tag diff-${diff}">${diffLabel}</span></div>
          <div class="q-link-cell">${q.url ? `<a class="q-ext-link ${lc}" href="${q.url}" target="_blank" rel="noopener">${ll}</a>` : ''}</div>
        </div>`;
      }).join('');

  document.getElementById('content-area').innerHTML = `
    <div class="section-header">
      <div class="sh-icon" style="background:${color}20">${icon}</div>
      <div class="sh-meta">
        <div class="sh-title">${topic}</div>
        <div class="sh-desc" id="sh-desc-${topic}">${s.done} of ${s.total} solved · ${s.pct}% complete</div>
        <div class="sh-actions">
          <button class="sh-btn" onclick="markAllDone('${topic}')">✅ Mark All Done</button>
          <button class="sh-btn danger" onclick="clearTopic('${topic}')">↺ Clear Topic</button>
        </div>
      </div>
    </div>

    <div class="topic-progress-bar">
      <span class="tpb-label">Progress</span>
      <div class="tpb-track">
        <div class="tpb-fill" id="tpb-fill" style="width:${s.pct}%;background:${color};"></div>
      </div>
      <span class="tpb-pct" id="tpb-pct">${s.pct}%</span>
      <span class="tpb-counts" id="tpb-counts">${s.done}/${s.total}</span>
    </div>

    <div class="filter-row">
      <div class="filter-chip${activeFilter==='all'?' active':''}" onclick="setFilter('all')">All (${qs.length})</div>
      <div class="filter-chip${activeFilter==='todo'?' active':''}" onclick="setFilter('todo')">⏳ Todo (${qs.filter(q=>!solved.has(qKey(topic,q.num))).length})</div>
      <div class="filter-chip${activeFilter==='done'?' active':''}" onclick="setFilter('done')">✅ Done (${s.done})</div>
    </div>

    <div class="q-table">
      <div class="q-table-header">
        <div></div>
        <div>#</div>
        <div>Question</div>
        <div style="text-align:center">Difficulty</div>
        <div style="text-align:right">Link</div>
      </div>
      ${rows}
    </div>
  `;
}

// ── TOGGLE QUESTION ───────────────────────────────────────
function toggleQ(topic, num, el) {
  const key = qKey(topic, num);
  const row = document.getElementById('row-' + key);
  if (solved.has(key)) {
    solved.delete(key);
    el.classList.remove('checked');
    row?.classList.remove('done');
  } else {
    solved.add(key);
    el.classList.add('checked');
    row?.classList.add('done');
    spawnParticles(el, COLORS[topic] || '#3b82f6');
  }
  saveState();
  updateAllStats();
  updateTopicProgressInline();
  if (activeFilter !== 'all') setTimeout(renderTopicView, 350);
}

function updateTopicProgressInline() {
  if (!currentTopic) return;
  const s = getTopicStats(currentTopic);
  const fill = document.getElementById('tpb-fill');
  const pct = document.getElementById('tpb-pct');
  const counts = document.getElementById('tpb-counts');
  const desc = document.getElementById('sh-desc-' + currentTopic);
  if (fill) fill.style.width = s.pct + '%';
  if (pct) pct.textContent = s.pct + '%';
  if (counts) counts.textContent = s.done + '/' + s.total;
  if (desc) desc.textContent = s.done + ' of ' + s.total + ' solved · ' + s.pct + '% complete';
}

// ── FILTERS ───────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  renderTopicView();
}

function onSearch(val) {
  searchQuery = val.toLowerCase();
  if (currentTopic) renderTopicView();
  else showOverview();
}

// ── BULK ACTIONS ──────────────────────────────────────────
function markAllDone(topic) {
  DSA_DATA[topic].forEach(q => solved.add(qKey(topic, q.num)));
  saveState(); updateAllStats(); renderTopicView();
}

function clearTopic(topic) {
  if (!confirm('Clear all progress for ' + topic + '?')) return;
  DSA_DATA[topic].forEach(q => solved.delete(qKey(topic, q.num)));
  saveState(); updateAllStats(); renderTopicView();
}

function resetAll() {
  if (!confirm('Reset ALL progress? This cannot be undone.')) return;
  solved.clear();
  saveState(); updateAllStats(); showOverview();
}

// ── EXPORT / IMPORT ───────────────────────────────────────
function exportProgress() {
  const data = JSON.stringify({ solved: [...solved], ts: Date.now() }, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dsa-progress-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importProgress() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const obj = JSON.parse(ev.target.result);
        if (Array.isArray(obj.solved)) {
          solved = new Set(obj.solved);
          saveState(); updateAllStats(); showOverview();
          alert('✅ Progress imported!');
        }
      } catch(err) { alert('Invalid file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── PARTICLES ─────────────────────────────────────────────
function spawnParticles(el, color) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const palette = [color, '#22c55e', '#f59e0b', '#60a5fa', '#c084fc'];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = 5 + Math.random()*7;
    const ang = (Math.PI*2*i/10) + Math.random()*0.6;
    const dist = 35 + Math.random()*45;
    p.style.cssText = `left:${cx-sz/2}px;top:${cy-sz/2}px;
      width:${sz}px;height:${sz}px;
      background:${palette[i%palette.length]};
      --tx:${Math.cos(ang)*dist}px;
      --ty:${Math.sin(ang)*dist - 20}px;
      --r:${Math.random()*360}deg;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 900);
  }
}

// ── CLOSE MOBILE SIDEBAR ──────────────────────────────────
function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search-input').blur();
    closeMobileSidebar();
  }
});

// ── INIT ─────────────────────────────────────────────────
loadState();
buildSidebarNav();
if (sidebarCollapsed) {
  document.getElementById('sidebar').classList.add('collapsed');
  document.getElementById('sidebar-toggle').textContent = '▶';
  document.getElementById('sidebar-toggle').style.left = '51px';
}
updateAllStats();
showOverview();
</script>
